services:
  postgres:
    image: postgres:16-alpine
    container_name: location-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: location_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: location-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: location-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: location-redisinsight
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - redis

  api:
    container_name: location-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://admin:admin_password@postgres:5432/location_db?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  web:
    container_name: location-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - PORT=3000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
