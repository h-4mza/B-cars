services:
  # Base de données PostgreSQL
  - type: pgo
    name: location-db
    plan: free
    region: frankfurt

  # Backend NestJS
  - type: web
    name: location-api
    env: node
    plan: free
    region: frankfurt
    buildCommand: pnpm install && pnpm db:generate && pnpm build
    startCommand: cd apps/api && pnpm start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: location-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
