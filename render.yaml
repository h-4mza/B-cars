databases:
  - name: location-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: location-api
    env: node
    plan: free
    region: frankfurt
    buildCommand: node scripts/prepare-prod.js && pnpm install --prod=false && pnpm db:generate && pnpm db:push && pnpm build
    startCommand: cd apps/api && pnpm start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: location-db
          property: connectionString
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        value: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
